<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website</title>

    <style>
      body {
        margin: 0;
        padding: 0;

      }

      p {
        margin: 10px;
        font-size: larger;
      }
      #front {
        width: 100%;
        height: 45px;
      }
      h1 {
        text-align: center;
        display: block;
      }
      #menu {
        list-style-type: none;
        overflow: hidden;
        background-color: #333333;
      }
      #menu li {
        float: left;
      }

      #menu li a {
        display: block;
        color: white;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
      }
      #selectables li a {
        display: block;
        color: rgb(46, 46, 46);
        text-align: left;
        text-decoration: none;
      }

      #clickable:hover {
        color: rgb(133, 133, 133);
      }
      #selectable {
        float: right;
      }

      #selectables {
        position: absolute;
        background-color: aliceblue;
        display: none;
      }
      #selectables li {
        display: block;
        text-decoration: none;
      }
      #menu li:hover #selectables {
        display: grid;
      }
      #selectables li:hover {
        background-color: rgb(173, 202, 228);
      }
      #cont {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      footer {
        border-top: 1px solid #dfdfdf;
        background-color: #f5f5f5;
        text-align: center;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div id="front">
      <ul id="menu">
        <li><a id="clickable" href="home.html" target="frome">Home</a></li>
        <li><a id="clickable" href="guide.html" target="frome">Guide</a></li>
        <li><a id="clickable" href="availability.html" target="frome">Availability</a></li>
        <li><a id="clickable" href="aboutus.html" target="frome">About</a></li>
        <li><a id="clickable" href="login.html" target="frome">Login</a></li>
        <li id="selectable">
          <a id="selector" href="#about">Select your product ></a>
          <ul id="selectables">
            <li><a href="electronics.html" target="frome">Electroics </a></li>
            <li><a href="food.html" target="frome">Groceries </a></li>
            <li><a href="clothes.html" target="frome">Clothing </a></li>
            <li><a href="misc.html" target="frome">Miscellanious </a></li>
          </ul>
        </li>
      </ul>
    </div>
    <div class="frame">
      <iframe
        src="home.html"
        width="100%"
        height="1000px"
        name="frome"
      ></iframe>
    </div>

    <footer>
      <p>
        Copyright © 2000-2025 - All Rights reserved - Tunisia
      </p>
    </footer>
  </body>
</html>
